name: Grant General Title

on:
  workflow_dispatch:
    inputs:
      player_id:
        description: 'Player index id from data/title-source.json players[] (0-based)'
        required: true
        type: string
      general_title_label:
        description: 'General title label in Chinese (中文称号)'
        required: true
        type: choice
        options:
          - 开拓者
          - 这是一个超长的称号测试字段如果到这里还没有被截断说明确实很长你说得对但是广告位招租啊哈大OW是我的家乡
          - 地图不是我做的
          - 野生开发者
          - 堡垒建筑师
          - 友善的地图维护者
          - 三合一地图作者
          - 害群之马
          - 纯害战士
          - 征服者
          - 主宰
          - 专家幸存者
          - 传奇挑战者
          - 地狱穿梭者
          - 终极闪避
          - 轻装上阵
          - 完美无缺
          - 永不言弃
          - 坚韧不拔
          - 速通传奇
          - 闪避の神
          - 智瞳开拓者
          - 大难不死
          - 胜天半子
          - 堡垒の偶像
          - 第一颗蛋
          - 我还能吃
          - 万象归一
          - 守望旅行家
          - 万域天穹
          - 狂暴烈焰
          - 万蛋丛中过
          - 天选之子
          - 幸运星
          - 赌王
          - 福星高照
          - 倒霉蛋
          - What can i say
          - 我命由我
          - 赌神
          - 牢 大
          - V我50
          - 钢门
          - 开了
          - 红包收藏家
          - 好运来
          - 千里独行
          - 踏遍青山
          - 我不会放过你的酸不辣
      dry_run:
        description: 'Preview only (do not create PR)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: grant-general-title-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  grant:
    runs-on: ubuntu-latest
    env:
      TZ: Asia/Singapore

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Grant general title
        shell: bash
        run: |
          set -euo pipefail
          cmd=(
            node tools/grant-player-title.mjs
            --player-id "${{ inputs.player_id }}"
            --general-title-label "${{ inputs.general_title_label }}"
          )

          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            cmd+=(--dry-run)
          fi

          "${cmd[@]}"

      - name: Detect title-related changes
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- data/title-source.json src/title/title-cn.opy web/title-query/public/data/titles.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No title-related file changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Title-related changes detected:"
            git diff --name-only -- data/title-source.json src/title/title-cn.opy web/title-query/public/data/titles.json
          fi

      - name: Create pull request for title grant
        if: ${{ inputs.dry_run != true && steps.changed.outputs.changed == 'true' }}
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: chore/grant-general-title-${{ github.run_id }}
          base: main
          delete-branch: true
          commit-message: |
            chore(title): grant ${{ inputs.general_title_label }} to player-id:${{ inputs.player_id }}

            source: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          title: chore(title): grant ${{ inputs.general_title_label }} to player-id:${{ inputs.player_id }}
          body: |
            Automated title grant request.

            - Player id: `${{ inputs.player_id }}`
            - General title label: `${{ inputs.general_title_label }}`
            - Trigger: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

            This PR was generated by `.github/workflows/grant-general-title.yml`.
          add-paths: |
            data/title-source.json
            src/title/title-cn.opy
            web/title-query/public/data/titles.json

      - name: Run summary
        shell: bash
        run: |
          echo "dry_run=${{ inputs.dry_run }}"
          echo "changed=${{ steps.changed.outputs.changed }}"
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "Dry run mode: PR creation skipped by design."
          elif [[ "${{ steps.changed.outputs.changed }}" != "true" ]]; then
            echo "No effective changes: PR creation skipped."
          fi
