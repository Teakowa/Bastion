name: Event Design/Change
description: 提交随机事件设计或改动提案 / Propose a random event design or change
title: "[Event] "
body:
  - type: markdown
    attributes:
      value: |
        请提供事件核心信息，便于快速评审。
        Please provide core event details for quick review.

  - type: input
    id: event_name
    attributes:
      label: 事件名称 / Event Name
      description: 例如：坚韧、登月火箭 / e.g. Tenacity, Moon Rocket
      placeholder: 输入事件名称 / Enter event name
    validations:
      required: true

  - type: dropdown
    id: event_type
    attributes:
      label: 事件类别 / Event Type
      description: 选择事件所属类别 / Select event category
      options:
        - Buff
        - Debuff
        - Mech
    validations:
      required: true

  - type: dropdown
    id: change_type
    attributes:
      label: 变更类型 / Change Type
      description: 可多选 / Multiple selections allowed
      multiple: true
      options:
        - 新增事件 / New event
        - 平衡调整 / Balance tuning
        - 重做 / Rework
        - 下线或移除 / Deprecate or remove
    validations:
      required: true

  - type: textarea
    id: effect_description
    attributes:
      label: 效果描述 / Effect Description
      description: 请说明触发条件、核心行为、清理行为 / Include trigger, core behavior, and cleanup behavior
      placeholder: |
        - 触发条件 / Trigger:
        - 核心行为 / Core behavior:
        - 清理行为 / Cleanup behavior:
    validations:
      required: true

  - type: input
    id: duration
    attributes:
      label: 持续时间 / Duration
      description: 请注明单位秒（可填区间）/ Specify in seconds (range allowed)
      placeholder: 例如 30 或 30-45 秒 / e.g. 30 or 30-45 seconds
    validations:
      required: true

  - type: input
    id: weight
    attributes:
      label: 权重 / Weight
      description: 用于 reject sampling 的事件权重 / Event weight for reject sampling
      placeholder: 例如 10
    validations:
      required: true

  - type: textarea
    id: extra_context
    attributes:
      label: 附加上下文 / Extra Context
      description: 选填，可附参考链接、录像、草图 / Optional links, videos, or design notes
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认清单 / Checklist
      options:
        - label: 我已知晓实现阶段需同步 main/devMain 与双 config（提案阶段无需在此详填）/ I understand implementation should sync main/devMain and both configs
          required: true
