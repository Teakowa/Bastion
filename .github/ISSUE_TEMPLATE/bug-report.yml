name: Bug Report
description: 提交缺陷反馈以便快速定位和修复 / Report a bug for fast triage and fix
title: "[Bug] "
body:
  - type: markdown
    attributes:
      value: |
        请尽量提供可复现信息，降低 triage 往返成本。
        Please provide reproducible context to reduce triage back-and-forth.

  - type: input
    id: summary
    attributes:
      label: 问题概述 / Summary
      description: 一句话说明问题 / One-line bug summary
      placeholder: 例如：某 Buff 事件结束后状态未清理 / e.g. Buff state is not cleared after event ends
    validations:
      required: true

  - type: textarea
    id: repro_steps
    attributes:
      label: 复现步骤 / Reproduction Steps
      description: 最好提供最小可复现路径 / Prefer minimal reproducible steps
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期结果 / Expected
      placeholder: 描述期望行为 / Describe expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际结果 / Actual
      placeholder: 描述实际行为与错误表现 / Describe actual behavior and symptoms
    validations:
      required: true

  - type: dropdown
    id: environment
    attributes:
      label: 发生环境 / Environment
      description: 首选问题首次出现的环境 / Select where issue is observed
      options:
        - 本地 / Local
        - CI Build Check
        - GitHub Release
        - GitHub Pages (Title Query)
        - 其他 / Other
    validations:
      required: true

  - type: textarea
    id: logs_screenshots
    attributes:
      label: 日志或截图 / Logs or Screenshots
      description: 选填，可粘贴日志或拖拽截图 / Optional logs, screenshots, recordings
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: 确认清单 / Checklist
      options:
        - label: 我已搜索重复 issue，或已在正文说明无法确认 / I searched duplicates or explained why I cannot confirm
          required: true
